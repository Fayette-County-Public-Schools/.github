# =============================================================================
# REUSABLE WORKFLOW: Composer Security Audit
# =============================================================================
# Location: Fayette-County-Public-Schools/.github
#   at: .github/workflows/composer-audit.yml
#
# This workflow is called by individual Laravel app repos. It:
#   1. Runs `composer audit` to check for known CVEs
#   2. Parses the JSON output for structured results
#   3. Opens a GitHub Issue in the calling repo if vulnerabilities are found
#   4. Opens a PR updating only the vulnerable packages
#   5. Closes any existing audit issues if the repo is now clean
# =============================================================================

name: Composer Security Audit (Reusable)

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        type: string
        default: '8.4'
      working-directory:
        description: 'Directory containing composer.json (relative to repo root)'
        type: string
        default: '.'
      issue-label:
        description: 'Label to apply to opened vulnerability issues'
        type: string
        default: 'security'
    secrets:
      token:
        description: 'GitHub token with issues:write and pull-requests:write permission'
        required: false # Falls back to GITHUB_TOKEN if not provided

jobs:
  composer-audit:
    name: Composer Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so we can push a new branch for the fix PR
          fetch-depth: 0

      # -----------------------------------------------------------------------
      - name: Setup PHP ${{ inputs.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer:v2
          coverage: none

      # -----------------------------------------------------------------------
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ inputs.php-version }}-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory)) }}
          restore-keys: |
            composer-${{ runner.os }}-${{ inputs.php-version }}-
            composer-${{ runner.os }}-

      # -----------------------------------------------------------------------
      - name: Configure Flux Pro credentials
        run: composer config http-basic.composer.fluxui.dev ${{ secrets.FLUX_EMAIL }} ${{ secrets.FLUX_SECRET }}

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          composer install \
            --no-interaction \
            --no-scripts \
            --prefer-dist \
            --optimize-autoloader

      # -----------------------------------------------------------------------
      - name: Run composer audit
        id: audit
        working-directory: ${{ inputs.working-directory }}
        # Exit codes: 0 = clean, 1 = advisories found, 2 = error
        # Capture output and handle exit code ourselves so we can process
        # results before deciding whether to fail the job.
        run: |
          set +e
          composer audit --format=json --no-interaction 2>/dev/null > audit-output.json
          AUDIT_EXIT=$?
          set -e

          echo "exit_code=$AUDIT_EXIT" >> $GITHUB_OUTPUT

          # Parse counts from JSON
          ADVISORY_COUNT=$(jq '.advisories | length' audit-output.json 2>/dev/null || echo "0")
          ABANDONED_COUNT=$(jq '.abandoned | length' audit-output.json 2>/dev/null || echo "0")

          echo "advisory_count=$ADVISORY_COUNT" >> $GITHUB_OUTPUT
          echo "abandoned_count=$ABANDONED_COUNT" >> $GITHUB_OUTPUT

          # Extract the list of vulnerable package names for targeted update
          VULNERABLE_PACKAGES=$(jq -r '.advisories | keys | join(" ")' audit-output.json 2>/dev/null || echo "")
          echo "vulnerable_packages=$VULNERABLE_PACKAGES" >> $GITHUB_OUTPUT

          # Emit a human-readable summary for the Actions log
          echo "## Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Advisories found:** $ADVISORY_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Abandoned packages:** $ABANDONED_COUNT" >> $GITHUB_STEP_SUMMARY

          if [ "$AUDIT_EXIT" -eq 0 ]; then
            echo "✅ No vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Vulnerabilities detected. A fix PR will be opened." >> $GITHUB_STEP_SUMMARY
            echo "- **Vulnerable packages:** \`$VULNERABLE_PACKAGES\`" >> $GITHUB_STEP_SUMMARY
          fi

      # -----------------------------------------------------------------------
      - name: Build issue body
        id: issue-body
        if: steps.audit.outputs.exit_code != '0'
        working-directory: ${{ inputs.working-directory }}
        run: |
          BODY=$(python3 << 'PYEOF'
          import json, sys, os

          with open("audit-output.json") as f:
              data = json.load(f)

          repo    = os.environ["GITHUB_REPOSITORY"]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          ref     = os.environ["GITHUB_REF_NAME"]

          lines = [
              "## 🔐 Composer Security Audit: Vulnerabilities Found",
              "",
              f"**Branch/Ref:** `{ref}`  ",
              f"**Workflow Run:** [{run_url}]({run_url})  ",
              "",
              "> A pull request has been automatically opened to update the vulnerable packages.",
              "",
          ]

          advisories = data.get("advisories", {})
          if advisories:
              lines.append("### 🚨 Security Advisories")
              lines.append("")
              for package, pkg_advisories in advisories.items():
                  if isinstance(pkg_advisories, list):
                      advisory_list = pkg_advisories
                  else:
                      advisory_list = [pkg_advisories]

                  for adv in advisory_list:
                      cve      = adv.get("cve", "N/A")
                      title    = adv.get("title", "No title")
                      link     = adv.get("link", "")
                      affected = adv.get("affectedVersions", "unknown")
                      reported = adv.get("reportedAt", "")

                      lines.append(f"#### `{package}`")
                      lines.append(f"- **CVE:** {cve}")
                      lines.append(f"- **Title:** {title}")
                      lines.append(f"- **Affected versions:** `{affected}`")
                      if reported:
                          lines.append(f"- **Reported:** {reported}")
                      if link:
                          lines.append(f"- **Advisory:** [{link}]({link})")
                      lines.append("")

          abandoned = data.get("abandoned", {})
          if abandoned:
              lines.append("### ⚠️ Abandoned Packages")
              lines.append("")
              lines.append("These packages are no longer maintained and may pose a long-term risk:")
              lines.append("")
              for package, replacement in abandoned.items():
                  if replacement:
                      lines.append(f"- `{package}` → consider replacing with `{replacement}`")
                  else:
                      lines.append(f"- `{package}` (no suggested replacement)")
              lines.append("")

          lines += [
              "---",
              "> This issue was automatically created by the Composer Audit workflow.",
              "> It will be closed automatically when the audit passes.",
          ]

          print("\n".join(lines))
          PYEOF
          )

          echo "$BODY" > issue-body.md
          echo "body_file=issue-body.md" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      - name: Create or update GitHub Issue
        id: upsert-issue
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          script: |
            const fs    = require('fs');
            const label = '${{ inputs.issue-label }}';
            const title = '🔐 Composer Security Audit: Vulnerabilities Detected';
            const body  = fs.readFileSync('${{ inputs.working-directory }}/issue-body.md', 'utf8');

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  label,
              });
            } catch {
              await github.rest.issues.createLabel({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                name:        label,
                color:       'd73a4a',
                description: 'Security vulnerability',
              });
            }

            // Check for an existing open audit issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: label,
            });

            const existing = issues.find(i => i.title === title);
            let issueNumber;

            if (existing) {
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.number,
                body:         body,
              });
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.number,
                body:         `🔄 Audit re-run on \`${context.ref}\` — vulnerabilities still present. A fix PR has been opened or updated.`,
              });
              issueNumber = existing.number;
              console.log(`Updated existing issue #${issueNumber}`);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  title,
                body:   body,
                labels: [label],
              });
              issueNumber = newIssue.number;
              console.log(`Created issue #${issueNumber}`);
            }

            core.setOutput('issue_number', issueNumber);

      # -----------------------------------------------------------------------
      - name: Update vulnerable packages and open fix PR
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        env:
          VULNERABLE_PACKAGES: ${{ steps.audit.outputs.vulnerable_packages }}
          ISSUE_NUMBER: ${{ steps.upsert-issue.outputs.issue_number }}
          WORKING_DIR: ${{ inputs.working-directory }}
          ISSUE_LABEL: ${{ inputs.issue-label }}
        with:
          github-token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const packages     = process.env.VULNERABLE_PACKAGES.trim();
            const issueNumber  = process.env.ISSUE_NUMBER;
            const workingDir   = process.env.WORKING_DIR;
            const label        = process.env.ISSUE_LABEL;
            const repo         = context.repo;
            const branchName   = 'fix/composer-security-audit';
            const prTitle      = '🔐 fix: update vulnerable Composer packages';

            if (!packages) {
              console.log('No vulnerable packages identified — skipping PR.');
              return;
            }

            // Configure git identity for the commit
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');

            // Check if fix branch already exists remotely
            let branchExists = false;
            try {
              execSync(`git ls-remote --exit-code origin refs/heads/${branchName}`);
              branchExists = true;
            } catch { /* branch does not exist yet */ }

             const { data: repoData } = await github.rest.repos.get({
              owner: repo.owner,
              repo:  repo.repo,
            });
            const defaultBranch = repoData.default_branch;
           
            if (branchExists) {
              execSync(`git fetch origin ${branchName}`);
              execSync(`git checkout -B ${branchName} origin/${defaultBranch}`);
            } else {
              execSync(`git checkout -b ${branchName}`);
            }

            // Run targeted composer update on only the vulnerable packages
            const updateCmd = `composer update ${packages} --no-interaction --no-scripts --prefer-dist`;
            console.log(`Running: ${updateCmd}`);
            try {
              execSync(updateCmd, { cwd: workingDir, stdio: 'inherit' });
            } catch (err) {
              console.error('composer update failed:', err.message);
              core.setFailed('composer update failed — check the workflow log for details.');
              return;
            }

            // Check if composer.lock actually changed
            const diff = execSync('git diff --name-only').toString().trim();
            if (!diff.includes('composer.lock') && !diff.includes('composer.json')) {
              console.log('No changes to composer.lock after update — packages may already be at latest allowed versions.');
              await github.rest.issues.createComment({
                owner:        repo.owner,
                repo:         repo.repo,
                issue_number: issueNumber,
                body:         '⚠️ Attempted `composer update` on vulnerable packages but `composer.lock` did not change. The vulnerabilities may require a manual version constraint update in `composer.json`.',
              });
              return;
            }

            // Commit the updated lock file
            execSync(`git add ${workingDir}/composer.lock ${workingDir}/composer.json || true`);
            execSync(`git commit -m "fix: update vulnerable Composer packages\n\nPackages updated: ${packages}\n\nResolves #${issueNumber}"`);
            execSync(`git push origin ${branchName} --force-with-lease`);

            // Build PR body
            const prBody = [
              `## 🔐 Composer Security Fix`,
              ``,
              `This PR was automatically generated by the Composer Audit workflow.`,
              `It updates only the packages flagged with security advisories.`,
              ``,
              `**Packages updated:** \`${packages.split(' ').join('`, `')}\``,
              ``,
              `Closes #${issueNumber}`,
              ``,
              `---`,
              `**Review checklist before merging:**`,
              `- [ ] Confirm \`composer audit\` passes on this branch`,
              `- [ ] Verify tests pass`,
              `- [ ] Check for any breaking changes in the updated package changelogs`,
            ].join('\n');

            // Check if a PR for this branch already exists
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: repo.owner,
              repo:  repo.repo,
              state: 'open',
              head:  `${repo.owner}:${branchName}`,
            });

            if (existingPRs.length > 0) {
              await github.rest.pulls.update({
                owner:        repo.owner,
                repo:         repo.repo,
                pull_number:  existingPRs[0].number,
                body:         prBody,
              });
              console.log(`Updated existing PR #${existingPRs[0].number}`);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: repo.owner,
                repo:  repo.repo,
                title: prTitle,
                body:  prBody,
                head:  branchName,
                base:  defaultBranch,
              });

              // Apply the security label to the PR
              await github.rest.issues.addLabels({
                owner:        repo.owner,
                repo:         repo.repo,
                issue_number: pr.number,
                labels:       [label],
              });

              // Link the PR back to the issue as a comment
              await github.rest.issues.createComment({
                owner:        repo.owner,
                repo:         repo.repo,
                issue_number: issueNumber,
                body:         `🔧 Fix PR opened: #${pr.number}`,
              });

              console.log(`Opened PR #${pr.number}`);
            }

      # -----------------------------------------------------------------------
      - name: Close audit issue if repo is clean
        if: steps.audit.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.token || secrets.GITHUB_TOKEN }}
          script: |
            const label = '${{ inputs.issue-label }}';
            const title = '🔐 Composer Security Audit: Vulnerabilities Detected';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              state:  'open',
              labels: label,
            });

            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.number,
                body:         '✅ Composer audit is now clean. Closing this issue automatically.',
              });
              await github.rest.issues.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: existing.number,
                state:        'closed',
              });
              console.log(`Closed issue #${existing.number} — audit is clean.`);
            } else {
              console.log('No open audit issue found. Nothing to close.');
            }

      # -----------------------------------------------------------------------
      - name: Fail job if vulnerabilities found
        if: steps.audit.outputs.exit_code != '0'
        run: |
          echo "::error::Composer audit found ${{ steps.audit.outputs.advisory_count }} advisory/advisories and ${{ steps.audit.outputs.abandoned_count }} abandoned package(s)."
          exit 1
